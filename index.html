    (function() {

    import React, { useState, useEffect, useRef, useCallback } from 'https://esm.sh/react@18.3.1';

            onClick={() => onChange(Math.max(min, value - 1))}
            className="w-7 h-7 flex items-center justify-center rounded-full transition-colors"
            style={{ background: 'var(--bg)', color: 'var(--ink)' }}
            aria-label="Decrease"
          >
            <Minus size={13} strokeWidth={1.8} />
          </button>
          <div className="w-14 text-center text-sm tabular-nums" style={{ color: 'var(--ink)' }}>
            {value}<span style={{ color: 'var(--faint)', marginLeft: 3 }}>{unit}</span>
          </div>
          <button
            onClick={() => onChange(Math.min(max, value + 1))}
            className="w-7 h-7 flex items-center justify-center rounded-full transition-colors"
            style={{ background: 'var(--bg)', color: 'var(--ink)' }}
            aria-label="Increase"
          >
            <Plus size={13} strokeWidth={1.8} />
          </button>
        </div>
      );
    }

    function Toggle({ on, onChange, iconOn, iconOff }) {
      return (
        <button
          onClick={() => onChange(!on)}
          className="relative inline-flex items-center transition-colors rounded-full"
          style={{ width: 44, height: 24, background: on ? 'var(--ink)' : 'var(--border)' }}
          aria-pressed={on}
        >
          <span
            className="absolute flex items-center justify-center rounded-full transition-all"
            style={{
              width: 18, height: 18, top: 3,
              left: on ? 23 : 3,
              background: 'var(--card)', color: 'var(--ink)',
            }}
          >
            {on ? iconOn : iconOff}
          </span>
        </button>
      );
    }

    function FocusTimer() {
      const [customPresets, setCustomPresets] = useState([]);
      const [storageReady, setStorageReady] = useState(false);

      const [settings, setSettings] = useState(DEFAULT_PRESETS[0]);
      const [activePresetId, setActivePresetId] = useState('classic');

      const [phase, setPhase] = useState('focus');
      const [sessionIndex, setSessionIndex] = useState(0);
      const [running, setRunning] = useState(false);
      const [endTime, setEndTime] = useState(null);
      const [pausedRemaining, setPausedRemaining] = useState(null);
      const [now, setNow] = useState(Date.now());

      const [autoStart, setAutoStart] = useState(false);
      const [soundOn, setSoundOn] = useState(true);

      const [settingsOpen, setSettingsOpen] = useState(false);
      const [saveOpen, setSaveOpen] = useState(false);
      const [newName, setNewName] = useState('');
      const [renamingId, setRenamingId] = useState(null);
      const [renamingName, setRenamingName] = useState('');

      // Stats
      const [stats, setStats] = useState({ byDate: {} });

      // Task labels
      const [currentTask, setCurrentTask] = useState('');

      // Theme
      const [themeMode, setThemeMode] = useState('auto');
      const [systemPrefersDark, setSystemPrefersDark] = useState(() =>
        (typeof window !== 'undefined' && window.matchMedia?.('(prefers-color-scheme: dark)')?.matches) || false
      );
      const isDark = themeMode === 'dark' || (themeMode === 'auto' && systemPrefersDark);

      // Notifications
      const [notifyEnabled, setNotifyEnabled] = useState(true);

      // Wake lock
      const [wakeLockEnabled, setWakeLockEnabled] = useState(true);
      const wakeLockRef = useRef(null);

      // Shared preset import banner
      const [pendingImport, setPendingImport] = useState(null);

      // Toast
      const [toast, setToast] = useState('');

      // Break prompt rotation
      const [breakPromptIdx, setBreakPromptIdx] = useState(() => Math.floor(Math.random() * BREAK_PROMPTS.length));

      useEffect(() => {
        (async () => {
          let presets = [];
          try {
            const p = await storage.get('focus:presets');
            if (p?.value) { presets = JSON.parse(p.value); setCustomPresets(presets); }
          } catch (e) {}
          try {
            const pr = await storage.get('focus:prefs');
            if (pr?.value) {
              const v = JSON.parse(pr.value);
              if (typeof v.autoStart === 'boolean') setAutoStart(v.autoStart);
              if (typeof v.soundOn === 'boolean')   setSoundOn(v.soundOn);
              if (v.lastPresetId) {
                const all = [...DEFAULT_PRESETS, ...presets];
                const found = all.find(x => x.id === v.lastPresetId);
                if (found) { setSettings(found); setActivePresetId(found.id); }
              }
            }
          } catch (e) {}
          try {
            const st = await storage.get('focus:stats');
            if (st?.value) setStats(JSON.parse(st.value));
          } catch (e) {}
          try {
            const tm = await storage.get('focus:theme');
            if (tm?.value) setThemeMode(tm.value);
          } catch (e) {}
          try {
            const ne = await storage.get('focus:notify');
            if (ne?.value) setNotifyEnabled(ne.value === 'true');
          } catch (e) {}
          try {
            const wl = await storage.get('focus:wakelock');
            if (wl?.value) setWakeLockEnabled(wl.value === 'true');
          } catch (e) {}
          setStorageReady(true);
        })();
      }, []);

      useEffect(() => {
        if (!storageReady) return;
        storage.set('focus:presets', JSON.stringify(customPresets)).catch(() => {});
      }, [customPresets, storageReady]);

      useEffect(() => {
        if (!storageReady) return;
        storage.set('focus:prefs', JSON.stringify({
          autoStart, soundOn, lastPresetId: activePresetId,
        })).catch(() => {});
      }, [autoStart, soundOn, activePresetId, storageReady]);

      useEffect(() => {
        if (!storageReady) return;
        storage.set('focus:stats', JSON.stringify(stats)).catch(() => {});
      }, [stats, storageReady]);

      useEffect(() => {
        if (!storageReady) return;
        storage.set('focus:theme', themeMode).catch(() => {});
      }, [themeMode, storageReady]);

      useEffect(() => {
        if (!storageReady) return;
        storage.set('focus:notify', String(notifyEnabled)).catch(() => {});
      }, [notifyEnabled, storageReady]);

      useEffect(() => {
        if (!storageReady) return;
        storage.set('focus:wakelock', String(wakeLockEnabled)).catch(() => {});
      }, [wakeLockEnabled, storageReady]);

      // Apply theme to document root + status bar color
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', isDark ? '#14110D' : '#F2EDE4');
      }, [isDark]);

      // Listen for system theme changes
      useEffect(() => {
        const mql = window.matchMedia?.('(prefers-color-scheme: dark)');
        if (!mql) return;
        const handler = (e) => setSystemPrefersDark(e.matches);
        try { mql.addEventListener('change', handler); } catch (e) { mql.addListener?.(handler); }
        return () => { try { mql.removeEventListener('change', handler); } catch (e) { mql.removeListener?.(handler); } };
      }, []);

      // Parse URL params for shared preset import
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const p = params.get('p');
        if (p) {
          try {
            const data = JSON.parse(atob(p));
            const imp = {
              name: String(data.n || 'Shared').slice(0, 40),
              focus: Math.max(1, Math.min(180, parseInt(data.f) || 25)),
              shortBreak: Math.max(1, Math.min(60, parseInt(data.s) || 5)),
              longBreak: Math.max(1, Math.min(90, parseInt(data.l) || 15)),
              sessions: Math.max(1, Math.min(10, parseInt(data.c) || 4)),
            };
            setPendingImport(imp);
          } catch (e) {}
          try { window.history.replaceState({}, '', window.location.pathname); } catch (e) {}
        }
      }, []);

      // Toast auto-dismiss
      useEffect(() => {
        if (!toast) return;
        const id = setTimeout(() => setToast(''), 2200);
        return () => clearTimeout(id);
      }, [toast]);

      // Rotate break prompt on entering a break phase
      useEffect(() => {
        if (phase === 'shortBreak' || phase === 'longBreak') {
          setBreakPromptIdx(Math.floor(Math.random() * BREAK_PROMPTS.length));
        }
      }, [phase]);

      // Wake lock while running
      useEffect(() => {
        let cancelled = false;
        const acquire = async () => {
          if (!wakeLockEnabled || !running) return;
          if (!('wakeLock' in navigator)) return;
          try {
            const lock = await navigator.wakeLock.request('screen');
            if (cancelled) { try { lock.release(); } catch (e) {} ; return; }
            wakeLockRef.current = lock;
          } catch (e) {}
        };
        const release = async () => {
          try {
            if (wakeLockRef.current) {
              await wakeLockRef.current.release();
              wakeLockRef.current = null;
            }
          } catch (e) {}
        };
        if (running) acquire(); else release();
        const onVis = () => {
          if (document.visibilityState === 'visible' && running && wakeLockEnabled && !wakeLockRef.current) acquire();
        };
        document.addEventListener('visibilitychange', onVis);
        return () => {
          cancelled = true;
          document.removeEventListener('visibilitychange', onVis);
          release();
        };
      }, [running, wakeLockEnabled]);

      const allPresets = [...DEFAULT_PRESETS, ...customPresets];

      useEffect(() => {
        if (!running) return;
        const id = setInterval(() => setNow(Date.now()), 200);
        return () => clearInterval(id);
      }, [running]);

      const phaseMinutes =
        phase === 'focus'      ? settings.focus      :
        phase === 'shortBreak' ? settings.shortBreak :
                                 settings.longBreak;
      const phaseDurationMs = phaseMinutes * 60 * 1000;

      const remainingMs = running
        ? Math.max(0, (endTime ?? 0) - now)
        : (pausedRemaining ?? phaseDurationMs);

      const remainingSec = Math.ceil(remainingMs / 1000);
      const mins = Math.floor(remainingSec / 60);
      const secs = remainingSec % 60;
      const progress = 1 - Math.max(0, Math.min(1, remainingMs / phaseDurationMs));

      const playChime = useCallback(() => {
        if (!soundOn) return;
        try {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          const ctx = new Ctx();
          [523.25, 659.25, 783.99].forEach((freq, i) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = freq; o.type = 'sine';
            const t = ctx.currentTime + i * 0.12;
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.18, t + 0.04);
            g.gain.exponentialRampToValueAtTime(0.001, t + 1.4);
            o.start(t); o.stop(t + 1.5);
          });
        } catch (e) {}
      }, [soundOn]);

      const transitionedRef = useRef(false);

      // Stats helpers
      const recordSession = (minutes, task) => {
        const today = todayYMD();
        setStats(s => {
          const cur = s.byDate[today] || { sessions: 0, minutes: 0, tasks: [] };
          return {
            ...s,
            byDate: {
              ...s.byDate,
              [today]: {
                sessions: cur.sessions + 1,
                minutes: cur.minutes + minutes,
                tasks: task ? [...cur.tasks, task].slice(-50) : cur.tasks,
              },
            },
          };
        });
      };

      const todayStats = stats.byDate[todayYMD()] || { sessions: 0, minutes: 0, tasks: [] };

      const streak = (() => {
        let n = 0;
        const cur = new Date();
        if (!stats.byDate[ymdOf(cur)] || stats.byDate[ymdOf(cur)].sessions === 0) {
          cur.setDate(cur.getDate() - 1);
        }
        while (true) {
          const k = ymdOf(cur);
          if (stats.byDate[k] && stats.byDate[k].sessions > 0) {
            n++;
            cur.setDate(cur.getDate() - 1);
          } else break;
        }
        return n;
      })();

      const weekDays = (() => {
        const out = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          const k = ymdOf(d);
          out.push({ key: k, sessions: stats.byDate[k]?.sessions || 0, minutes: stats.byDate[k]?.minutes || 0, isToday: i === 0 });
        }
        return out;
      })();

      // Notifications + haptics
      const notify = (title, body) => {
        if (!notifyEnabled) return;
        if (typeof Notification === 'undefined') return;
        if (Notification.permission !== 'granted') return;
        if (document.visibilityState === 'visible') return;
        try { new Notification(title, { body, icon: './focus-icon.png', tag: 'focus-phase' }); } catch (e) {}
      };

      const requestNotifyPermission = async () => {
        if (typeof Notification === 'undefined') return;
        if (Notification.permission === 'default') {
          try { await Notification.requestPermission(); } catch (e) {}
        }
      };

      const vibrate = (pattern) => {
        try { navigator.vibrate?.(pattern); } catch (e) {}
      };

      // Sharing
      const encodePreset = (p) => btoa(JSON.stringify({ n: p.name, f: p.focus, s: p.shortBreak, l: p.longBreak, c: p.sessions }));

      const sharePreset = async (p) => {
        const url = window.location.origin + window.location.pathname + '?p=' + encodePreset(p);
        const data = { title: 'Focus preset: ' + p.name, text: p.name + ' — ' + p.focus + '/' + p.shortBreak + '/' + p.longBreak + ' ×' + p.sessions, url };
        if (navigator.share) {
          try { await navigator.share(data); return; } catch (e) {}
        }
        try { await navigator.clipboard.writeText(url); setToast('Preset link copied'); }
        catch (e) { setToast('Could not copy link'); }
      };

      const shareApp = async () => {
        const url = window.location.origin + window.location.pathname;
        const data = { title: 'Focus', text: 'Deep work, on a timer.', url };
        if (navigator.share) {
          try { await navigator.share(data); return; } catch (e) {}
        }
        try { await navigator.clipboard.writeText(url); setToast('Link copied'); }
        catch (e) { setToast('Could not copy link'); }
      };

      const acceptImport = () => {
        if (!pendingImport) return;
        const np = {
          id: 'custom-' + Date.now(),
          name: pendingImport.name,
          focus: pendingImport.focus,
          shortBreak: pendingImport.shortBreak,
          longBreak: pendingImport.longBreak,
          sessions: pendingImport.sessions,
          builtIn: false,
        };
        setCustomPresets(arr => [...arr, np]);
        setActivePresetId(np.id);
        setSettings(np);
        setPendingImport(null);
        setToast('Imported "' + np.name + '"');
      };

      const advancePhase = useCallback((completed = true) => {
        const wasFocus = phase === 'focus';
        if (wasFocus && completed) {
          recordSession(settings.focus, currentTask);
        }
        if (wasFocus) setCurrentTask('');
        let nextPhase, nextIndex = sessionIndex;
        if (wasFocus) {
          nextIndex = sessionIndex + 1;
          if (nextIndex >= settings.sessions) { nextPhase = 'longBreak'; nextIndex = 0; }
          else { nextPhase = 'shortBreak'; }
        } else { nextPhase = 'focus'; }
        setPhase(nextPhase);
        setSessionIndex(nextIndex);
        setPausedRemaining(null);
        setRunning(false);
        // Side effects on a real (non-skipped) transition
        if (completed) {
          const phaseLabel = nextPhase === 'focus' ? 'Focus session starting' : nextPhase === 'shortBreak' ? 'Short break — recharge' : 'Long break — you earned it';
          const mins = nextPhase === 'focus' ? settings.focus : nextPhase === 'shortBreak' ? settings.shortBreak : settings.longBreak;
          notify(phaseLabel, mins + ' minutes');
          vibrate(nextPhase === 'longBreak' ? [60, 80, 60, 80, 60] : wasFocus ? [80] : [60, 60, 60]);
        }
        if (autoStart) {
          const dur =
            nextPhase === 'focus'      ? settings.focus      :
            nextPhase === 'shortBreak' ? settings.shortBreak :
                                         settings.longBreak;
          setTimeout(() => {
            setEndTime(Date.now() + dur * 60 * 1000);
            setRunning(true);
          }, 700);
        }
      }, [phase, sessionIndex, settings, autoStart, currentTask, notifyEnabled]);

      useEffect(() => {
        if (running && remainingMs <= 0 && !transitionedRef.current) {
          transitionedRef.current = true;
          playChime();
          advancePhase();
        }
        if (remainingMs > 200) transitionedRef.current = false;
      }, [running, remainingMs, playChime, advancePhase]);

      const start = () => {
        if (notifyEnabled) requestNotifyPermission();
        const dur = pausedRemaining ?? phaseDurationMs;
        setEndTime(Date.now() + dur);
        setPausedRemaining(null);
        setRunning(true);
      };
      const pauseTimer = () => { setPausedRemaining(remainingMs); setRunning(false); };
      const reset = () => { setRunning(false); setPausedRemaining(null); setPhase('focus'); setSessionIndex(0); };
      const skip  = () => { setRunning(false); setPausedRemaining(null); playChime(); advancePhase(false); };

      const selectPreset = (p) => {
        setActivePresetId(p.id);
        setSettings(p);
        setRunning(false); setPausedRemaining(null);
        setPhase('focus'); setSessionIndex(0);
        setCurrentTask('');
      };

      const updateSetting = (key, value) => {
        setSettings(s => ({ ...s, [key]: value }));
        setRunning(false); setPausedRemaining(null);
        // If a custom preset is selected, edit it in place; default presets fork to "Custom"
        const isCustom = customPresets.some(p => p.id === activePresetId);
        if (isCustom) {
          setCustomPresets(arr => arr.map(p => p.id === activePresetId ? { ...p, [key]: value } : p));
        } else {
          setActivePresetId(null);
        }
      };

      const savePreset = () => {
        const name = newName.trim();
        if (!name) return;
        const np = {
          id: 'custom-' + Date.now(),
          name, focus: settings.focus, shortBreak: settings.shortBreak,
          longBreak: settings.longBreak, sessions: settings.sessions, builtIn: false,
        };
        setCustomPresets(arr => [...arr, np]);
        setActivePresetId(np.id); setSettings(np);
        setNewName(''); setSaveOpen(false);
      };

      const deletePreset = (id) => {
        setCustomPresets(arr => arr.filter(x => x.id !== id));
        if (activePresetId === id) selectPreset(DEFAULT_PRESETS[0]);
      };

      const renamePreset = (id, name) => {
        const trimmed = name.trim();
        if (!trimmed) { setRenamingId(null); setRenamingName(''); return; }
        setCustomPresets(arr => arr.map(p => p.id === id ? { ...p, name: trimmed } : p));
        if (activePresetId === id) setSettings(s => ({ ...s, name: trimmed }));
        setRenamingId(null); setRenamingName('');
      };

      const phaseColor = PHASE_META[phase].color;
      const fmt = (n) => String(n).padStart(2, '0');

      return (
        <div
          className="min-h-screen w-full flex items-center justify-center p-4"
          style={{
            background: 'var(--bg)', fontFamily: SANS, color: 'var(--ink)',
            backgroundImage: `radial-gradient(circle at 20% 0%, rgba(168,69,31,0.04), transparent 60%), radial-gradient(circle at 80% 100%, rgba(46,82,102,0.04), transparent 60%)`,
            paddingTop: 'max(1rem, env(safe-area-inset-top))',
            paddingBottom: 'max(1rem, env(safe-area-inset-bottom))',
          }}
        >
          <div className="w-full max-w-md">
            {pendingImport && (
              <div className="mb-5 p-4 rounded-2xl" style={{ background: 'var(--card)', border: '1px solid var(--border)', boxShadow: '0 1px 0 rgba(0,0,0,0.02), 0 30px 60px -30px rgba(28,26,23,0.12)' }}>
                <div className="text-[10px] uppercase tracking-[0.25em]" style={{ color: 'var(--muted)', fontFamily: MONO }}>Shared preset</div>
                <div className="mt-1" style={{ fontFamily: SERIF, fontStyle: 'italic', fontWeight: 300, fontSize: 22, color: 'var(--ink)', letterSpacing: '-0.01em' }}>{pendingImport.name}</div>
                <div className="text-[10px] tabular-nums mt-1" style={{ color: 'var(--muted)', fontFamily: MONO }}>
                  {pendingImport.focus}m focus · {pendingImport.shortBreak}m short · {pendingImport.longBreak}m long · ×{pendingImport.sessions}
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={() => setPendingImport(null)} className="flex-1 py-2.5 rounded-xl transition-all" style={{ background: 'transparent', border: '1px solid var(--border)', color: 'var(--muted)', fontFamily: MONO, fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase' }}>
                    Skip
                  </button>
                  <button onClick={acceptImport} className="flex-1 py-2.5 rounded-xl transition-all" style={{ background: 'var(--ink)', color: 'var(--card)', fontFamily: MONO, fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase' }}>
                    Import
                  </button>
                </div>
              </div>
            )}
            <div className="flex items-center justify-between mb-6">
              <div>
                <div className="text-[10px] uppercase tracking-[0.25em]" style={{ color: 'var(--muted)', fontFamily: MONO }}>Focus</div>
                <div className="text-2xl leading-none mt-1" style={{ fontFamily: SERIF, fontWeight: 300, fontStyle: 'italic', letterSpacing: '-0.01em' }}>
                  Deep work, on a timer.
                </div>
              </div>
              <button
                onClick={() => setSettingsOpen(true)}
                className="w-10 h-10 flex items-center justify-center rounded-full transition-all"
                style={{ background: 'var(--card)', border: `1px solid var(--border)`, color: 'var(--ink)' }}
                aria-label="Settings"
              >
                <Settings size={16} strokeWidth={1.5} />
              </button>
            </div>

            <div className="-mx-1 mb-8 overflow-x-auto preset-scroll" style={{ scrollbarWidth: 'none' }}>
              <div className="flex gap-2 px-1 pb-1">
                {allPresets.map(p => {
                  const active = activePresetId === p.id;
                  return (
                    <button
                      key={p.id}
                      onClick={() => selectPreset(p)}
                      className="px-4 py-2 rounded-full whitespace-nowrap transition-all text-xs"
                      style={{
                        background: active ? 'var(--ink)' : 'var(--card)',
                        color: active ? 'var(--card)' : 'var(--ink)',
                        border: `1px solid ${active ? 'var(--ink)' : 'var(--border)'}`,
                        fontFamily: MONO, fontWeight: 500, letterSpacing: '0.02em',
                      }}
                    >
                      {p.name}
                    </button>
                  );
                })}
                {activePresetId === null && (
                  <div
                    className="px-4 py-2 rounded-full whitespace-nowrap text-xs flex items-center gap-1.5"
                    style={{ background: 'transparent', color: 'var(--muted)', border: `1px dashed var(--border)`, fontFamily: MONO, fontStyle: 'italic' }}
                  >Custom</div>
                )}
              </div>
            </div>

            <div
              className="relative rounded-2xl overflow-hidden"
              style={{
                background: 'var(--card)',
                border: `1px solid var(--border)`,
                boxShadow: '0 1px 0 rgba(0,0,0,0.02), 0 30px 60px -30px rgba(28,26,23,0.12)',
              }}
            >
              <div className="flex items-center justify-between px-6 pt-6 pb-2">
                <div className="flex items-center gap-2">
                  <span className="inline-block rounded-full" style={{ width: 6, height: 6, background: phaseColor }} />
                  <span className="text-[10px] uppercase tracking-[0.25em]" style={{ color: 'var(--muted)', fontFamily: MONO }}>
                    {PHASE_META[phase].full}
                  </span>
                </div>
                <span className="text-[10px] uppercase tracking-[0.25em] tabular-nums" style={{ color: 'var(--muted)', fontFamily: MONO }}>
                  {phase === 'focus' ? `${sessionIndex + 1} / ${settings.sessions}` : '—'}
                </span>
              </div>

              <div className="px-6 pt-1 pb-1" style={{ minHeight: 32 }}>
                {phase === 'focus' && !running && remainingMs >= phaseDurationMs - 500 ? (
                  <input
                    type="text"
                    value={currentTask}
                    onChange={(e) => setCurrentTask(e.target.value)}
                    placeholder="What are you working on?"
                    maxLength={60}
                    className="w-full bg-transparent outline-none text-center"
                    style={{ fontFamily: SERIF, fontStyle: 'italic', fontWeight: 300, fontSize: 16, color: 'var(--ink)' }}
                  />
                ) : phase === 'focus' && currentTask ? (
                  <div className="text-center truncate px-2" style={{ fontFamily: SERIF, fontStyle: 'italic', fontWeight: 300, fontSize: 15, color: 'var(--muted)' }}>
                    {currentTask}
                  </div>
                ) : (phase === 'shortBreak' || phase === 'longBreak') ? (
                  <div className="text-center px-2" style={{ fontFamily: SERIF, fontStyle: 'italic', fontWeight: 300, fontSize: 15, color: 'var(--muted)' }}>
                    {BREAK_PROMPTS[breakPromptIdx]}
                  </div>
                ) : null}
              </div>

              <div className="px-6 pt-4 pb-8 flex flex-col items-center">
                <div
                  className="tabular-nums leading-none select-none"
                  style={{
                    fontFamily: SERIF, fontWeight: 250,
                    fontSize: 'clamp(86px, 22vw, 132px)',
                    letterSpacing: '-0.04em', color: 'var(--ink)',
                    fontVariantNumeric: 'tabular-nums',
                  }}
                >
                  {fmt(mins)}<span style={{ color: 'var(--faint)', fontWeight: 200 }}>:</span>{fmt(secs)}
                </div>

                <div className="w-full mt-8 rounded-full overflow-hidden" style={{ height: 2, background: 'var(--border)' }}>
                  <div
                    className="h-full transition-all"
                    style={{ width: `${progress * 100}%`, background: phaseColor, transitionDuration: running ? '200ms' : '300ms' }}
                  />
                </div>

                <div className="flex items-center gap-2 mt-6">
                  {Array.from({ length: settings.sessions }).map((_, i) => {
                    const done = i < sessionIndex;
                    const current = i === sessionIndex && phase === 'focus';
                    return (
                      <span
                        key={i}
                        className="rounded-full transition-all"
                        style={{ width: current ? 18 : 6, height: 6, background: done || current ? 'var(--focus)' : 'var(--border)' }}
                      />
                    );
                  })}
                </div>
              </div>

              <div className="px-6 pb-6 flex items-center justify-center gap-3">
                <button onClick={reset} className="w-12 h-12 flex items-center justify-center rounded-full transition-all"
                  style={{ background: 'transparent', border: `1px solid var(--border)`, color: 'var(--muted)' }} aria-label="Reset">
                  <RotateCcw size={15} strokeWidth={1.5} />
                </button>
                <button
                  onClick={running ? pauseTimer : start}
                  className="h-14 px-8 flex items-center justify-center gap-2 rounded-full transition-all"
                  style={{
                    background: 'var(--ink)', color: 'var(--card)', minWidth: 160,
                    fontFamily: MONO, fontSize: 12, fontWeight: 500,
                    letterSpacing: '0.18em', textTransform: 'uppercase',
                  }}
                >
                  {running ? <Pause size={14} strokeWidth={2} fill={'var(--card)'} /> : <Play size={14} strokeWidth={2} fill={'var(--card)'} />}
                  {running ? 'Pause' : (pausedRemaining ? 'Resume' : 'Begin')}
                </button>
                <button onClick={skip} className="w-12 h-12 flex items-center justify-center rounded-full transition-all"
                  style={{ background: 'transparent', border: `1px solid var(--border)`, color: 'var(--muted)' }} aria-label="Skip phase">
                  <SkipForward size={15} strokeWidth={1.5} />
                </button>
              </div>
            </div>

            <div className="mt-6 px-1">
              <div className="flex items-end justify-between mb-3">
                <div>
                  <div className="text-[10px] uppercase tracking-[0.25em]" style={{ color: 'var(--muted)', fontFamily: MONO }}>Today</div>
                  <div className="mt-1 tabular-nums" style={{ fontFamily: SERIF, fontWeight: 300, fontStyle: 'italic', fontSize: 24, letterSpacing: '-0.01em' }}>
                    {todayStats.sessions}<span style={{ color: 'var(--faint)', marginLeft: 6, fontSize: 13 }}>{todayStats.sessions === 1 ? 'session' : 'sessions'}</span>
                    <span style={{ color: 'var(--faint)', margin: '0 8px' }}>·</span>
                    {formatMinutes(todayStats.minutes)}
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-[10px] uppercase tracking-[0.25em]" style={{ color: 'var(--muted)', fontFamily: MONO }}>Streak</div>
                  <div className="mt-1 tabular-nums" style={{ fontFamily: SERIF, fontWeight: 300, fontStyle: 'italic', fontSize: 24, letterSpacing: '-0.01em' }}>
                    {streak}<span style={{ color: 'var(--faint)', marginLeft: 6, fontSize: 13 }}>{streak === 1 ? 'day' : 'days'}</span>
                  </div>
                </div>
              </div>
              <div className="flex items-end gap-1.5" style={{ height: 28 }}>
                {weekDays.map((d) => {
                  const max = Math.max(1, ...weekDays.map(x => x.sessions));
                  const h = d.sessions > 0 ? Math.max(15, (d.sessions / max) * 100) : 8;
                  return (
                    <div key={d.key} className="flex-1 rounded-sm transition-all" style={{
                      height: h + '%',
                      background: d.sessions > 0 ? 'var(--focus)' : 'var(--border)',
                      opacity: d.isToday ? 1 : (d.sessions > 0 ? 0.5 : 0.7),
                      alignSelf: 'flex-end',
                    }} />
                  );
                })}
              </div>
              <div className="mt-3 text-center text-[9px] uppercase tracking-[0.25em]" style={{ color: 'var(--faint)', fontFamily: MONO }}>
                {settings.focus}m focus · {settings.shortBreak}m short · {settings.longBreak}m long · ×{settings.sessions}
              </div>
            </div>
          </div>

          {settingsOpen && (
            <div
              className="fixed inset-0 z-50 flex items-end sm:items-center justify-center"
              style={{ background: 'rgba(28,26,23,0.4)', backdropFilter: 'blur(4px)' }}
              onClick={() => setSettingsOpen(false)}
            >
              <div
                className="w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl overflow-hidden"
                style={{ background: 'var(--card)', border: `1px solid var(--border)`, maxHeight: '90vh', overflowY: 'auto' }}
                onClick={(e) => e.stopPropagation()}
              >
                <div className="flex items-center justify-between px-6 py-4 sticky top-0" style={{ background: 'var(--card)', borderBottom: `1px solid var(--border)` }}>
                  <div>
                    <div className="text-[10px] uppercase tracking-[0.25em]" style={{ color: 'var(--muted)', fontFamily: MONO }}>Customize</div>
                    <div className="text-xl mt-0.5" style={{ fontFamily: SERIF, fontWeight: 300, fontStyle: 'italic' }}>
                      {activePresetId ? allPresets.find(p => p.id === activePresetId)?.name ?? 'Custom' : 'Custom'}
                    </div>
                  </div>
                  <button onClick={() => setSettingsOpen(false)} className="w-9 h-9 flex items-center justify-center rounded-full" style={{ background: 'var(--bg)', color: 'var(--ink)' }} aria-label="Close">
                    <X size={16} strokeWidth={1.5} />
                  </button>
                </div>

                <div className="px-6 py-5">
                  <div className="text-[10px] uppercase tracking-[0.25em] mb-4" style={{ color: 'var(--muted)', fontFamily: MONO }}>Theme</div>
                  <div className="flex gap-2">
                    {[
                      { id: 'auto',  label: 'Auto',  Icon: Monitor },
                      { id: 'light', label: 'Light', Icon: Sun },
                      { id: 'dark',  label: 'Dark',  Icon: Moon },
                    ].map(({ id, label, Icon }) => {
                      const active = themeMode === id;
                      return (
                        <button key={id} onClick={() => setThemeMode(id)}
                          className="flex-1 py-3 rounded-xl flex flex-col items-center gap-1.5 transition-all"
                          style={{
                            background: active ? 'var(--ink)' : 'transparent',
                            color: active ? 'var(--card)' : 'var(--ink)',
                            border: '1px solid ' + (active ? 'var(--ink)' : 'var(--border)'),
                            fontFamily: MONO, fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase',
                          }}>
                          <Icon size={16} strokeWidth={1.5} />
                          {label}
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div style={{ borderTop: '1px solid var(--border)' }} />

                <div className="px-6 py-5">
                  <div className="text-[10px] uppercase tracking-[0.25em] mb-4" style={{ color: 'var(--muted)', fontFamily: MONO }}>Durations</div>
                  <div className="space-y-3">
                    {[
                      { key: 'focus',      label: 'Focus',       max: 180, color: 'var(--focus)'    },
                      { key: 'shortBreak', label: 'Short break', max: 60,  color: 'var(--short-brk)' },
                      { key: 'longBreak',  label: 'Long break',  max: 90,  color: 'var(--long-brk)'  },
                    ].map(row => (
                      <div key={row.key} className="flex items-center justify-between">
                        <div className="flex items-center gap-3">
                          <span className="inline-block rounded-full" style={{ width: 6, height: 6, background: row.color }} />
                          <span style={{ fontSize: 14, color: 'var(--ink)' }}>{row.label}</span>
                        </div>
                        <NumberField value={settings[row.key]} onChange={(v) => updateSetting(row.key, v)} min={1} max={row.max} />
                      </div>
                    ))}
                    <div className="flex items-center justify-between pt-1">
                      <div className="flex items-center gap-3">
                        <span className="inline-block rounded-full" style={{ width: 6, height: 6, background: 'var(--faint)' }} />
                        <span style={{ fontSize: 14, color: 'var(--ink)' }}>Sessions per cycle</span>
                      </div>
                      <NumberField value={settings.sessions} onChange={(v) => updateSetting('sessions', v)} min={1} max={10} unit="×" />
                    </div>
                  </div>
                </div>

                <div style={{ borderTop: `1px solid var(--border)` }} />

                <div className="px-6 py-5">
                  <div className="text-[10px] uppercase tracking-[0.25em] mb-4" style={{ color: 'var(--muted)', fontFamily: MONO }}>Options</div>
                  <div className="space-y-4">
                    <div className="flex items-center justify-between">
                      <div>
                        <div style={{ fontSize: 14, color: 'var(--ink)' }}>Auto-start next phase</div>
                        <div className="text-xs mt-0.5" style={{ color: 'var(--muted)' }}>Roll into the next session without tapping</div>
                      </div>
                      <Toggle on={autoStart} onChange={setAutoStart}
                        iconOn={<Zap size={10} strokeWidth={2} fill={'var(--ink)'} />}
                        iconOff={<ZapOff size={10} strokeWidth={2} />} />
                    </div>
                    <div className="flex items-center justify-between">
                      <div>
                        <div style={{ fontSize: 14, color: 'var(--ink)' }}>Chime on transition</div>
                        <div className="text-xs mt-0.5" style={{ color: 'var(--muted)' }}>Soft triad when a phase ends</div>
                      </div>
                      <Toggle on={soundOn} onChange={setSoundOn}
                        iconOn={<Volume2 size={10} strokeWidth={2} />}
                        iconOff={<VolumeX size={10} strokeWidth={2} />} />
                    </div>
                    <div className="flex items-center justify-between">
                      <div>
                        <div style={{ fontSize: 14, color: 'var(--ink)' }}>Notifications</div>
                        <div className="text-xs mt-0.5" style={{ color: 'var(--muted)' }}>Alert when a phase ends if you've switched apps</div>
                      </div>
                      <Toggle on={notifyEnabled} onChange={(v) => { setNotifyEnabled(v); if (v) requestNotifyPermission(); }}
                        iconOn={<Bell size={10} strokeWidth={2} />}
                        iconOff={<BellOff size={10} strokeWidth={2} />} />
                    </div>
                    <div className="flex items-center justify-between">
                      <div>
                        <div style={{ fontSize: 14, color: 'var(--ink)' }}>Keep screen on</div>
                        <div className="text-xs mt-0.5" style={{ color: 'var(--muted)' }}>Prevent the phone from sleeping during sessions</div>
                      </div>
                      <Toggle on={wakeLockEnabled} onChange={setWakeLockEnabled}
                        iconOn={<Sun size={10} strokeWidth={2} />}
                        iconOff={<Moon size={10} strokeWidth={2} />} />
                    </div>
                  </div>
                </div>

                <div style={{ borderTop: `1px solid var(--border)` }} />

                <div className="px-6 py-5">
                  <div className="text-[10px] uppercase tracking-[0.25em] mb-4" style={{ color: 'var(--muted)', fontFamily: MONO }}>Preset</div>
                  {saveOpen ? (
                    <div className="space-y-3">
                      <input
                        type="text" value={newName}
                        onChange={(e) => setNewName(e.target.value)}
                        placeholder="Preset name" autoFocus
                        className="w-full px-4 py-3 rounded-xl outline-none"
                        style={{ background: 'var(--bg)', border: `1px solid var(--border)`, fontSize: 14, color: 'var(--ink)', fontFamily: SANS }}
                        onKeyDown={(e) => { if (e.key === 'Enter') savePreset(); }}
                      />
                      <div className="flex gap-2">
                        <button onClick={() => { setSaveOpen(false); setNewName(''); }} className="flex-1 py-3 rounded-xl transition-all"
                          style={{ background: 'transparent', border: `1px solid var(--border)`, color: 'var(--muted)', fontFamily: MONO, fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase' }}>
                          Cancel
                        </button>
                        <button onClick={savePreset} disabled={!newName.trim()} className="flex-1 py-3 rounded-xl transition-all flex items-center justify-center gap-2"
                          style={{ background: newName.trim() ? 'var(--ink)' : 'var(--border)', color: newName.trim() ? 'var(--card)' : 'var(--muted)', fontFamily: MONO, fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase' }}>
                          <Check size={12} strokeWidth={2} /> Save
                        </button>
                      </div>
                    </div>
                  ) : (
                    <button onClick={() => setSaveOpen(true)} className="w-full py-3 rounded-xl transition-all flex items-center justify-center gap-2"
                      style={{ background: 'transparent', border: `1px dashed var(--border)`, color: 'var(--ink)', fontFamily: MONO, fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase' }}>
                      <Plus size={12} strokeWidth={2} /> Save current as preset
                    </button>
                  )}
                  {customPresets.length > 0 && (
                    <div className="mt-5">
                      <div className="text-[10px] uppercase tracking-[0.25em] mb-3" style={{ color: 'var(--muted)', fontFamily: MONO }}>Your presets</div>
                      <div className="space-y-1">
                        {customPresets.map(p => (
                          <div key={p.id} className="flex items-center justify-between py-2 px-3 rounded-lg gap-2" style={{ background: 'var(--bg)' }}>
                            {renamingId === p.id ? (
                              <>
                                <input
                                  type="text"
                                  value={renamingName}
                                  onChange={(e) => setRenamingName(e.target.value)}
                                  autoFocus
                                  className="flex-1 min-w-0 px-3 py-2 rounded-md outline-none"
                                  style={{ background: 'var(--card)', border: `1px solid var(--border)`, fontSize: 13, color: 'var(--ink)', fontFamily: SANS }}
                                  onKeyDown={(e) => {
                                    if (e.key === 'Enter') renamePreset(p.id, renamingName);
                                    if (e.key === 'Escape') { setRenamingId(null); setRenamingName(''); }
                                  }}
                                />
                                <button onClick={() => { setRenamingId(null); setRenamingName(''); }} className="w-8 h-8 flex items-center justify-center rounded-full transition-all" style={{ color: 'var(--muted)' }} aria-label="Cancel rename">
                                  <X size={13} strokeWidth={1.5} />
                                </button>
                                <button onClick={() => renamePreset(p.id, renamingName)} className="w-8 h-8 flex items-center justify-center rounded-full transition-all" style={{ color: 'var(--ink)', background: 'var(--card)', border: `1px solid var(--border)` }} aria-label="Save name">
                                  <Check size={13} strokeWidth={1.8} />
                                </button>
                              </>
                            ) : (
                              <>
                                <div className="min-w-0 flex-1">
                                  <div className="truncate" style={{ fontSize: 13, color: 'var(--ink)' }}>{p.name}</div>
                                  <div className="text-[10px] tabular-nums mt-0.5" style={{ color: 'var(--muted)', fontFamily: MONO }}>
                                    {p.focus}m · {p.shortBreak}m · {p.longBreak}m · ×{p.sessions}
                                  </div>
                                </div>
                                <div className="flex items-center">
                                  <button onClick={() => sharePreset(p)} className="w-8 h-8 flex items-center justify-center rounded-full transition-all" style={{ color: 'var(--muted)' }} aria-label={`Share ${p.name}`}>
                                    <Share2 size={13} strokeWidth={1.5} />
                                  </button>
                                  <button onClick={() => { setRenamingId(p.id); setRenamingName(p.name); }} className="w-8 h-8 flex items-center justify-center rounded-full transition-all" style={{ color: 'var(--muted)' }} aria-label={`Rename ${p.name}`}>
                                    <Pencil size={13} strokeWidth={1.5} />
                                  </button>
                                  <button onClick={() => deletePreset(p.id)} className="w-8 h-8 flex items-center justify-center rounded-full transition-all" style={{ color: 'var(--muted)' }} aria-label={`Delete ${p.name}`}>
                                    <Trash2 size={13} strokeWidth={1.5} />
                                  </button>
                                </div>
                              </>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                <div style={{ borderTop: '1px solid var(--border)' }} />

                <div className="px-6 py-5">
                  <div className="text-[10px] uppercase tracking-[0.25em] mb-4" style={{ color: 'var(--muted)', fontFamily: MONO }}>Share</div>
                  <button onClick={shareApp} className="w-full py-3 rounded-xl transition-all flex items-center justify-center gap-2"
                    style={{ background: 'transparent', border: '1px solid var(--border)', color: 'var(--ink)',
                      fontFamily: MONO, fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase' }}>
                    <Share2 size={12} strokeWidth={2} />
                    Share Focus
                  </button>
                </div>
                <div className="h-2" />
              </div>
            </div>
          )}

          {toast && (
            <div className="fixed left-1/2 px-4 py-2 rounded-full text-[11px] z-[60]" style={{
              bottom: 'max(1.5rem, env(safe-area-inset-bottom))',
              transform: 'translateX(-50%)',
              background: 'var(--ink)',
              color: 'var(--card)',
              fontFamily: MONO,
              letterSpacing: '0.1em',
              textTransform: 'uppercase',
            }}>
              {toast}
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<FocusTimer />);
  </script>
</body>
</html>
